name: "CodeQL"

on:
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    if: github.actor != 'dependabot[bot]'
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    timeout-minutes:  360 
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["go"]

    steps:
      - name: Checkout repository
        uses: namespacelabs/nscloud-checkout-action@v7

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: internal/extension/opampconnectionextension/go.mod
          cache: false
      - name: Set up Go cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}
          # If you wish to specify custom queries, you can do so here or in a config file.
          # By default, queries listed here will override any specified in a config file.
          # Prefix the list here with "+" to use these queries and those in the config file.

          # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
          # queries: security-extended,security-and-quality

      # There is no root Go module (the collector is assembled by ocb from
      # the manifest), so autobuild would find nothing to trace at the repo
      # root. Build every module explicitly so CodeQL's Go tracer extracts
      # all first-party packages. Migrated modules are skipped, matching the
      # rest of CI.
      - name: Build all modules
        run: make for-all-modules CMD="go build ./..."

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "/language:${{matrix.language}}"
