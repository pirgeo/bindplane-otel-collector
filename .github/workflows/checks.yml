name: pr_checks
on:
  workflow_dispatch:

jobs:
  # Graphite CI optimization: skip redundant CI runs for stacked PRs.
  # See https://graphite.com/docs/stacking-and-ci
  optimize_ci:
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      skip: ${{ steps.check_skip.outputs.skip }}
    steps:
      - name: Optimize CI
        id: check_skip
        uses: withgraphite/graphite-ci-action@26bc0dcdeaba101794931d67a464ecbb21a76a8b # v0.0.9 tag (no formal releases)
        with:
          graphite_token: ${{ secrets.GRAPHITE_CI_OPTIMIZER_TOKEN }}

  # Detect which files changed to skip irrelevant jobs on PRs.
  detect-changes:
    if: ${{ needs.optimize_ci.outputs.skip != 'true' }}
    needs: optimize_ci
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # if this file changed, run all checks. if the makefile changed, run all checks.
      go: ${{ steps.filter.outputs.go == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true'  }}
      dockerfile: ${{ steps.filter.outputs.dockerfile == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true' }}
      scripts: ${{ steps.filter.outputs.scripts == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true' }}
      misspell: ${{ steps.filter.outputs.misspell == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true' }}
      plugin-docs: ${{ steps.filter.outputs.plugin-docs == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true' }}
      gomod: ${{ steps.filter.outputs.gomod == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true' }}
      dependabot: ${{ steps.filter.outputs.dependabot == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true' }}
      manifest: ${{ steps.filter.outputs.manifest == 'true' || steps.filter.outputs.checks == 'true' || steps.filter.outputs.makefile == 'true' }}
      components: ${{ steps.filter.outputs.components }}
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@v7
      - name: Detect changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          # These filters are based on picomatch syntax https://github.com/micromatch/picomatch#
          # Components list should be based on source of truth 'migrated-modules.txt' in root of repo
          filters: |
            checks:
              - '.github/workflows/checks.yml'
            makefile:
              - 'Makefile'
            go:
              - '**/*.go'
              - '**/go.mod'
              - '**/go.sum'
            dockerfile:
              - 'docker/Dockerfile.*'
            scripts:
              - '**/*.sh'
              - '**/*.ps1'
            misspell:
              - '**/*.md'
              - '**/*.yaml'
            plugin-docs:
              - 'docs/plugins/**'
              - 'plugins/**'
            gomod:
              - '**/go.mod'
            dependabot:
              - '.github/dependabot.yml'
            manifest:
              - 'manifests/**'
              - '**/go.mod'
              - '**/go.sum'
              - 'Makefile'
              - 'internal/extension/opampconnectionextension/cmd/main/**'
            components:
              - 'receiver/**'
              - 'processor/**'
              - 'exporter/**'
              - 'extension/**'
              - 'counter/**'
              - 'expr/**'
              - 'version/**'
              - 'internal/aws/**'
              - 'internal/azureblob/**'
              - 'internal/blobconsume/**'
              - 'internal/exporterutils/**'
              - 'internal/measurements/**'
              - 'internal/osinfo/**'
              - 'internal/report/snapshot/**'
              - 'internal/storageclient/**'
              - 'internal/testutils/**'

  setup-tools:
    if: ${{ needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' }}
    needs: optimize_ci
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@v7
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: internal/extension/opampconnectionextension/go.mod
          cache: false # Use Namespace caching instead
      - name: Set up Go cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go
      - name: Cache Tools
        id: tool-cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          path: /home/runner/go/bin
      - name: Install Tools
        run: make install-tools

  check-fmt:
    if: ${{ needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.go == 'true' }}
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    needs:
      - optimize_ci
      - setup-tools
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@v7
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: internal/extension/opampconnectionextension/go.mod
          cache: false # Use Namespace caching instead
      - name: Set up Go cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go
      - name: Cache Tools
        id: tool-cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          path: /home/runner/go/bin
      - name: Install Tools
        run: make install-tools
      - name: Check Formatting
        run: make check-fmt

  verify-manifest:
    if: ${{ needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.manifest == 'true' }}
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    needs:
      - optimize_ci
      - setup-tools
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@v7
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: internal/extension/opampconnectionextension/go.mod
          cache: false # Use Namespace caching instead
      - name: Set up Go cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go
      - name: Install ocb
        run: make install-ocb
      - name: Verify manifest
        run: make verify-manifest

  check-license:
    if: ${{ needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && (needs.detect-changes.outputs.go == 'true' || needs.detect-changes.outputs.dockerfile == 'true' || needs.detect-changes.outputs.scripts == 'true') }}
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    needs:
      - optimize_ci
      - setup-tools
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@v7
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: internal/extension/opampconnectionextension/go.mod
          cache: false # Use Namespace caching instead
      - name: Set up Go cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go
      - name: Cache Tools
        id: tool-cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          path: /home/runner/go/bin
      - name: Install Tools
        run: make install-tools
      - name: Check License Headers
        run: make check-license

  gosec:
    if: ${{ needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.go == 'true' }}
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    needs:
      - optimize_ci
      - setup-tools
      - detect-changes
    steps:
      - name: Checkout Source
        uses: namespacelabs/nscloud-checkout-action@v7
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: internal/extension/opampconnectionextension/go.mod
          cache: false # Use Namespace caching instead
      - name: Set up Go cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go
      - name: Cache Tools
        id: tool-cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          path: /home/runner/go/bin
      - name: Install Tools
        run: make install-tools
      - name: Run Gosec Security Scanner
        run: make gosec

  misspell:
    if: ${{ needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.misspell == 'true' }}
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    needs:
      - optimize_ci
      - setup-tools
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@v7
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: internal/extension/opampconnectionextension/go.mod
          cache: false # Use Namespace caching instead
      - name: Set up Go cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go
      - name: Cache Tools
        id: tool-cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          path: /home/runner/go/bin
      - name: Install Tools
        run: make install-tools
      - name: Check for Misspelled Words in Doc Files
        run: make misspell

  lint:
    if: ${{ needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.go == 'true' }}
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    needs:
      - optimize_ci
      - setup-tools
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@v7
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: internal/extension/opampconnectionextension/go.mod
          cache: false # Use Namespace caching instead
      - name: Set up Go cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go
      - name: Cache Tools
        id: tool-cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          path: /home/runner/go/bin
      - name: Install Tools
        run: make install-tools
      - name: Run Revive Linter
        run: make lint

  # Below checks don't need to run `make install-tools`
  check-plugin-docs:
    if: ${{ needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.plugin-docs == 'true' }}
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    needs:
      - optimize_ci
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@v7
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: internal/extension/opampconnectionextension/go.mod
          cache: false # Use Namespace caching instead
      - name: Set up Go cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go
      - name: Plugin Doc Generation
        run: make create-plugin-docs
      - name: Check Changed Plugin Docs
        uses: tj-actions/verify-changed-files@v17
        id: verify-changed-files
        with:
          files: |
            docs/plugins
      - name: Verify No Plugin Doc Changes
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        run: exit 1

  # Below checks don't need to run `make install-tools`
  check-mod-paths:
    if: ${{ needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && needs.detect-changes.outputs.gomod == 'true' }}
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    needs:
      - optimize_ci
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@v7
      - name: Check Module Paths
        run: make check-mod-paths

  check-dependabot:
    if: ${{ needs.optimize_ci.outputs.skip != 'true' && github.actor != 'dependabot[bot]' && (needs.detect-changes.outputs.dependabot == 'true' || needs.detect-changes.outputs.gomod == 'true') }}
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    needs:
      - optimize_ci
      - detect-changes
    steps:
      - name: Checkout Sources
        uses: namespacelabs/nscloud-checkout-action@v7
      - name: Check Dependabot
        run: make check-dependabot

  check-component-changes:
    if: ${{ needs.optimize_ci.outputs.skip != 'true' && needs.detect-changes.outputs.components == 'true' }}
    runs-on: namespace-profile-bindplane-default-ubuntu-24-04
    needs:
      - optimize_ci
      - detect-changes
    steps:
      - name: Fail on component changes
        run: |
          echo "::error::Changes detected in component directories that have been migrated to the bindplane-otel-contrib repository."
          echo "The following directories must not be modified in this repository:"
          echo "  receiver/, processor/, exporter/, extension/,"
          echo "  counter/, expr/, version/, "
          echo "  internal/aws/, internal/azureblob/, internal/blobconsume/,"
          echo "  internal/exporterutils/, internal/measurements/, internal/osinfo/,"
          echo "  internal/report/snapshot/, internal/storageclient/, internal/testutils/"
          echo ""
          echo "Please make these changes in https://github.com/observIQ/bindplane-otel-contrib instead."
          exit 1
